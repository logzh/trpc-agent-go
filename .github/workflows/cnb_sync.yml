name: Sync to CNB
# on: [push]
on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GIT_LFS_SKIP_SMUDGE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 建议设为 0，拉取所有分支和历史，避免同步不全
          lfs: false # 不拉取 LFS 对象，避免 GitHub LFS 预算/历史缺失对象阻断同步
          
      - name: get repo name
        id: repo-name
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "name=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: Allow sync without historical LFS objects
        run: git config --local lfs.allowincompletepush true
  
      - name: Sync to CNB Repository
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -w ${{ github.workspace }} \
            -e GIT_CONFIG_COUNT="1" \
            -e GIT_CONFIG_KEY_0="lfs.allowincompletepush" \
            -e GIT_CONFIG_VALUE_0="true" \
            -e GIT_LFS_SKIP_SMUDGE="1" \
            -e PLUGIN_TARGET_URL="https://cnb.cool/spencezhang/${{ steps.repo-name.outputs.name }}.git" \
            -e PLUGIN_AUTH_TYPE="https" \
            -e PLUGIN_USERNAME="cnb" \
            -e PLUGIN_PASSWORD=${{ secrets.CNB_TOKEN }} \
            -e PLUGIN_BRANCH="${{ github.ref_name }}" \
            -e PLUGIN_FORCE="true" \
            tencentcom/git-sync
